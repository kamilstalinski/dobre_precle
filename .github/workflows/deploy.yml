name: Deploy to cyberfolks

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.8"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          CONTENTFUL_REVALIDATE_SECRET: ${{ secrets.CONTENTFUL_REVALIDATE_SECRET }}

      - name: Install lftp and sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y lftp sshpass openssh-client

      - name: Diag — DNS + TCP + SSH banner
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          echo "== DNS =="
          getent hosts "$SFTP_HOST" || echo "DNS lookup failed"
          echo "== TCP 22 =="
          timeout 10 bash -c "</dev/tcp/$SFTP_HOST/22" && echo "port 22 reachable" || echo "port 22 unreachable"
          echo "== SSH banner (5s) =="
          timeout 5 bash -c "exec 3<>/dev/tcp/$SFTP_HOST/22; head -1 <&3" || echo "no banner"

      - name: Diag — sftp auth test
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -p 22 "$SFTP_HOST" >> ~/.ssh/known_hosts 2>&1 || true
          echo "ls" | SSHPASS="$SFTP_PASS" sshpass -e \
            sftp -v -oStrictHostKeyChecking=no -oBatchMode=no \
            -P 22 "$SFTP_USER@$SFTP_HOST" 2>&1 | head -80 || true

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          debug 4
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 15
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 4
          set mirror:use-pget-n 2
          open -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST
          mirror --reverse --verbose --only-newer \
            --exclude-glob .git \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob .next/cache/ \
            --exclude-glob .env \
            --exclude-glob '.env.*' \
            --exclude-glob scripts/ \
            --exclude-glob .DS_Store \
            --exclude-glob .vscode/ \
            --exclude-glob .idea/ \
            --exclude-glob coverage/ \
            --exclude-glob .eslintcache \
            --exclude-glob README.md \
            ./ /domains/dobreprecle.pl/public_html/dobreprecle_nextapp/
          bye
          EOF
