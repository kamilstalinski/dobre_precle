name: Deploy to cyberfolks

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      REMOTE_PATH: /home/gzlyzadnon/domains/dobreprecle.pl/public_html/dobreprecle_nextapp
      APP_URL: https://dobreprecle.pl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.8"
          cache: "npm"

      - name: Install dependencies (CI)
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          CONTENTFUL_REVALIDATE_SECRET: ${{ secrets.CONTENTFUL_REVALIDATE_SECRET }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Pre-deploy — app status
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cloudlinux-selector get --json --interpreter nodejs --app-root $REMOTE_PATH" || true

      - name: Stop app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cloudlinux-selector stop --json --interpreter nodejs --app-root $REMOTE_PATH" || \
            echo "::warning ::Stop failed (app may already be stopped)"

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          rsync -avz --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='scripts' \
            --exclude='.DS_Store' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='coverage' \
            --exclude='.eslintcache' \
            --exclude='README.md' \
            --exclude='tmp/restart.txt' \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

      - name: Install production dependencies on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            source /home/gzlyzadnon/nodevenv/domains/dobreprecle.pl/public_html/dobreprecle_nextapp/18/bin/activate &&
            cd $REMOTE_PATH &&
            npm ci --omit=dev
          "

      - name: Start app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cloudlinux-selector start --json --interpreter nodejs --app-root $REMOTE_PATH"

      - name: Touch passenger restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "mkdir -p $REMOTE_PATH/tmp && touch $REMOTE_PATH/tmp/restart.txt" || true

      - name: Health check
        run: |
          echo "Waiting for app to become healthy..."
          for i in {1..18}; do
            STATUS=$(curl -ksS -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "::notice ::App is up (HTTP 200) on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "::error ::App did not return HTTP 200 within 90s"
          exit 1
